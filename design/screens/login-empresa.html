<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeopleFlow — Ingreso empresas</title>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/theme.js"></script>
  <link rel="stylesheet" href="assets/base.css" />
</head>

<body class="min-h-screen font-sans text-ink antialiased">
  <div class="grid min-h-screen lg:grid-cols-2">

    <!-- Effect panel (left) — animation only -->
    <div class="relative hidden overflow-hidden border-r border-line bg-base lg:block">
      <div id="floatingLines" class="absolute inset-0"></div>
      <div class="pointer-events-none relative z-10 p-12">
        <a href="../landing-preview/index.html" class="pointer-events-auto inline-block w-fit">
          <img src="assets/peopleflow-dark.webp" alt="PeopleFlow" class="h-7 w-auto" />
        </a>
      </div>
    </div>

    <!-- Form panel (right) -->
    <div class="flex items-center justify-center bg-surface px-6 py-12 sm:px-10">
      <div class="w-full max-w-[400px]">
        <a href="../landing-preview/index.html" class="mb-8 inline-block lg:hidden">
          <img src="assets/peopleflow-dark.webp" alt="PeopleFlow" class="h-7 w-auto" />
        </a>

        <p class="eyebrow mb-3 font-mono text-[11px] font-semibold uppercase text-brand">Acceso empresas</p>
        <h1 class="font-display text-[32px] font-bold tracking-tight text-ink">Ingresa a tu cuenta</h1>
        <p class="mt-2 text-[15px] text-muted">Gestiona tus vacantes y tu pipeline.</p>

        <form class="mt-8 flex flex-col gap-5" onsubmit="return false">
          <div>
            <label class="mb-1.5 block text-[13px] font-medium text-ink">Email corporativo</label>
            <input type="email" placeholder="tu@empresa.com" class="field w-full rounded-lg border border-line bg-base px-4 py-3 text-[15px] text-ink placeholder:text-muted/70" />
          </div>
          <div>
            <div class="mb-1.5 flex items-center justify-between">
              <label class="block text-[13px] font-medium text-ink">Contraseña</label>
              <a href="#" class="text-[13px] text-brand transition hover:text-glow">¿Olvidaste tu contraseña?</a>
            </div>
            <input type="password" placeholder="••••••••" class="field w-full rounded-lg border border-line bg-base px-4 py-3 text-[15px] text-ink placeholder:text-muted/70" />
          </div>
          <label class="flex cursor-pointer items-center gap-2.5 text-[13px] text-muted">
            <input type="checkbox" class="h-4 w-4 rounded border-line bg-surface accent-brand" /> Mantener sesión iniciada
          </label>
          <button class="btn btn-primary mt-1 w-full rounded-lg bg-brand py-3 text-[15px] font-semibold text-white">Ingresar</button>
        </form>

        <div class="my-7 flex items-center gap-4 text-[12px] text-muted">
          <span class="h-px flex-1 bg-line"></span> o continúa con <span class="h-px flex-1 bg-line"></span>
        </div>

        <div class="flex flex-col gap-3">
          <button class="btn btn-ghost flex w-full items-center justify-center gap-2.5 rounded-lg border border-line bg-base py-3 text-[14px] font-medium text-ink"><span class="font-mono text-[13px] text-muted">G</span> Continuar con Google</button>
          <button class="btn btn-ghost flex w-full items-center justify-center gap-2.5 rounded-lg border border-line bg-base py-3 text-[14px] font-medium text-ink"><span class="font-mono text-[13px] text-muted">M</span> Continuar con Microsoft</button>
        </div>

        <p class="mt-8 text-center text-[14px] text-muted">¿No tienes cuenta? <a href="#" class="font-semibold text-brand transition hover:text-glow">Registra tu empresa</a></p>
        <p class="mt-3 text-center text-[13px] text-muted">¿Eres candidato? <a href="login-candidato.html" class="font-semibold text-cyan transition hover:text-ink">Ingresa aquí</a></p>
      </div>
    </div>
  </div>

  <!-- FloatingLines (Three.js) — inlined for file:// portability -->
  <script type="module">
    const THREE = await import('https://esm.sh/three@0.160.0');
    const container = document.getElementById('floatingLines');
    if (container) {
      const cfg = { linesGradient: ['#9336ea', '#6f6f6f', '#6a6a6a'], lineCount: 8, lineDistance: 0.08, animationSpeed: 1, bendRadius: 8, bendStrength: -2, mouseDamping: 0.05, parallaxStrength: 0.2,
        top: [10.0, 0.5, -0.4], mid: [5.0, 0.0, 0.2], bot: [2.0, -0.7, -1] };
      const vertexShader = `void main(){ gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`;
      const fragmentShader = `precision highp float;
      uniform float iTime; uniform vec3 iResolution; uniform float animationSpeed;
      uniform int topLineCount; uniform int middleLineCount; uniform int bottomLineCount;
      uniform float topLineDistance; uniform float middleLineDistance; uniform float bottomLineDistance;
      uniform vec3 topWavePosition; uniform vec3 middleWavePosition; uniform vec3 bottomWavePosition;
      uniform vec2 iMouse; uniform float bendRadius; uniform float bendStrength; uniform float bendInfluence;
      uniform vec2 parallaxOffset; uniform vec3 lineGradient[8]; uniform int lineGradientCount;
      mat2 rot(float r){ return mat2(cos(r),sin(r),-sin(r),cos(r)); }
      vec3 pickGrad(int index){ vec3 c=lineGradient[0]; for(int k=0;k<8;k++){ if(k>=lineGradientCount) break; if(k==index) c=lineGradient[k]; } return c; }
      vec3 getLineColor(float t){ if(lineGradientCount<=0) return vec3(0.0); if(lineGradientCount==1) return pickGrad(0)*0.5; float ct=clamp(t,0.0,0.9999); float s=ct*float(lineGradientCount-1); int i=int(floor(s)); float f=fract(s); int j=min(i+1,lineGradientCount-1); return mix(pickGrad(i),pickGrad(j),f)*0.5; }
      float wave(vec2 uv,float offset,vec2 su,vec2 mu){ float time=iTime*animationSpeed; float amp=sin(offset+time*0.2)*0.3; float y=sin(uv.x+offset+time*0.1)*amp; vec2 d=su-mu; float infl=exp(-dot(d,d)*bendRadius); y+=(mu.y-su.y)*infl*bendStrength*bendInfluence; float m=uv.y-y; return 0.0175/max(abs(m)+0.01,1e-3)+0.01; }
      void main(){
        vec2 baseUv=(2.0*gl_FragCoord.xy-iResolution.xy)/iResolution.y; baseUv.y*=-1.0; baseUv+=parallaxOffset;
        vec2 mu=(2.0*iMouse-iResolution.xy)/iResolution.y; mu.y*=-1.0;
        vec3 col=vec3(0.0);
        for(int i=0;i<8;++i){ if(i>=bottomLineCount) break; float fi=float(i); float t=fi/max(float(bottomLineCount-1),1.0); float a=bottomWavePosition.z*log(length(baseUv)+1.0); vec2 ruv=baseUv*rot(a); col+=getLineColor(t)*wave(ruv+vec2(bottomLineDistance*fi+bottomWavePosition.x,bottomWavePosition.y),1.5+0.2*fi,baseUv,mu)*0.2; }
        for(int i=0;i<8;++i){ if(i>=middleLineCount) break; float fi=float(i); float t=fi/max(float(middleLineCount-1),1.0); float a=middleWavePosition.z*log(length(baseUv)+1.0); vec2 ruv=baseUv*rot(a); col+=getLineColor(t)*wave(ruv+vec2(middleLineDistance*fi+middleWavePosition.x,middleWavePosition.y),2.0+0.15*fi,baseUv,mu); }
        for(int i=0;i<8;++i){ if(i>=topLineCount) break; float fi=float(i); float t=fi/max(float(topLineCount-1),1.0); float a=topWavePosition.z*log(length(baseUv)+1.0); vec2 ruv=baseUv*rot(a); ruv.x*=-1.0; col+=getLineColor(t)*wave(ruv+vec2(topLineDistance*fi+topWavePosition.x,topWavePosition.y),1.0+0.2*fi,baseUv,mu)*0.1; }
        gl_FragColor=vec4(col,1.0);
      }`;
      const hex = (h)=>{ h=h.replace('#',''); return new THREE.Vector3(parseInt(h.slice(0,2),16)/255,parseInt(h.slice(2,4),16)/255,parseInt(h.slice(4,6),16)/255); };
      const scene=new THREE.Scene(); const cam=new THREE.OrthographicCamera(-1,1,1,-1,0,1); cam.position.z=1;
      const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false}); renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
      renderer.domElement.style.width='100%'; renderer.domElement.style.height='100%'; container.appendChild(renderer.domElement);
      container.style.mixBlendMode='screen';
      const grad=Array.from({length:8},()=>new THREE.Vector3(1,1,1)); cfg.linesGradient.forEach((h,i)=>{ const c=hex(h); grad[i].set(c.x,c.y,c.z); });
      const u={ iTime:{value:0}, iResolution:{value:new THREE.Vector3(1,1,1)}, animationSpeed:{value:cfg.animationSpeed},
        topLineCount:{value:cfg.lineCount}, middleLineCount:{value:cfg.lineCount}, bottomLineCount:{value:cfg.lineCount},
        topLineDistance:{value:cfg.lineDistance}, middleLineDistance:{value:cfg.lineDistance}, bottomLineDistance:{value:cfg.lineDistance},
        topWavePosition:{value:new THREE.Vector3(...cfg.top)}, middleWavePosition:{value:new THREE.Vector3(...cfg.mid)}, bottomWavePosition:{value:new THREE.Vector3(...cfg.bot)},
        iMouse:{value:new THREE.Vector2(-1000,-1000)}, bendRadius:{value:cfg.bendRadius}, bendStrength:{value:cfg.bendStrength}, bendInfluence:{value:0},
        parallaxOffset:{value:new THREE.Vector2(0,0)}, lineGradient:{value:grad}, lineGradientCount:{value:cfg.linesGradient.length} };
      const mat=new THREE.ShaderMaterial({uniforms:u,vertexShader,fragmentShader});
      const mesh=new THREE.Mesh(new THREE.PlaneGeometry(2,2),mat); scene.add(mesh);
      const clock=new THREE.Clock();
      const tm=new THREE.Vector2(-1000,-1000), cm=new THREE.Vector2(-1000,-1000); let ti=0,ci=0; const tp=new THREE.Vector2(), cp=new THREE.Vector2();
      const resize=()=>{ renderer.setSize(container.clientWidth||1,container.clientHeight||1,false); u.iResolution.value.set(renderer.domElement.width,renderer.domElement.height,1); };
      resize(); new ResizeObserver(resize).observe(container);
      window.addEventListener('mousemove',(e)=>{ const r=renderer.domElement.getBoundingClientRect(); const x=e.clientX-r.left,y=e.clientY-r.top,dpr=renderer.getPixelRatio(); tm.set(x*dpr,(r.height-y)*dpr); ti=1.0; tp.set((x-r.width/2)/r.width*cfg.parallaxStrength, -(y-r.height/2)/r.height*cfg.parallaxStrength); },{passive:true});
      container.addEventListener('pointerleave',()=>{ ti=0.0; });
      const loop=()=>{ requestAnimationFrame(loop); u.iTime.value=clock.getElapsedTime(); cm.lerp(tm,cfg.mouseDamping); u.iMouse.value.copy(cm); ci+=(ti-ci)*cfg.mouseDamping; u.bendInfluence.value=ci; cp.lerp(tp,cfg.mouseDamping); u.parallaxOffset.value.copy(cp); renderer.render(scene,cam); };
      loop();
    }
  </script>
</body>
</html>
